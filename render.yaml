services:
  - type: web
    name: api-tester-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run db:generate && npm run db:push
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false